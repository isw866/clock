<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>100以内趣味数学 - 数形结合版</title>
    <style>
        :root { --primary: #4caf50; --secondary: #ff9800; --bg: #fdf6e3; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg); display: flex; justify-content: center; padding: 20px; margin: 0; }
        .container { background: white; padding: 30px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 600px; border: 5px solid var(--primary); }
        h1 { color: #2c3e50; text-align: center; font-size: 28px; }
        
        /* 按钮样式 */
        .menu { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 25px; }
        button { padding: 12px; font-size: 18px; cursor: pointer; border: none; border-radius: 15px; transition: 0.2s; background: var(--primary); color: white; font-weight: bold; }
        button:hover { filter: brightness(1.1); transform: translateY(-2px); }
        .btn-explain { background: var(--secondary); margin-top: 10px; display: none; width: 100%; }

        /* 题目显示 */
        #display-area { text-align: center; margin: 20px 0; padding: 20px; border-radius: 15px; background: #f0f4f8; }
        #question { font-size: 56px; font-weight: bold; color: #333; margin: 0; }
        
        /* 讲解区域（数形结合） */
        #explanation { display: none; margin-top: 20px; padding: 20px; border: 2px dashed var(--secondary); border-radius: 15px; background: #fffde7; }
        .visual-box { display: flex; align-items: center; justify-content: center; gap: 10px; margin: 15px 0; flex-wrap: wrap; }
        
        /* 模拟计数棒 */
        .stick-ten { width: 15px; height: 50px; background: #795548; border: 2px solid #5d4037; border-top: 5px solid #ffeb3b; border-radius: 3px; display: inline-block; position: relative; margin-right: 2px; }
        .stick-ten::after { content: '10'; font-size: 9px; color: white; position: absolute; bottom: 2px; width: 100%; text-align: center; }
        .stick-one { width: 6px; height: 40px; background: #ffeb3b; border: 1px solid #fbc02d; display: inline-block; border-radius: 2px; margin-right: 3px; }
        
        .op-sign { font-size: 30px; font-weight: bold; margin: 0 10px; }
        .step-text { color: #d32f2f; font-weight: bold; margin-top: 10px; border-left: 4px solid #d32f2f; padding-left: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h1>🔢 100以内口算乐园</h1>
    
    <div class="menu">
        <button onclick="ask('add')">两位数加法</button>
        <button onclick="ask('sub')">两位数减法</button>
        <button onclick="ask('mix')">加减混合</button>
        <button onclick="ask('chain')">三个数连算</button>
    </div>

    <div id="display-area">
        <p id="question">选个挑战吧！</p>
        <button id="solve-btn" class="btn-explain" onclick="showExplanation()">💡 我要看解析</button>
    </div>

    <div id="explanation">
        <div id="visual-steps"></div>
        <div id="text-steps"></div>
    </div>
</div>

<script>
    let currentData = null;

    // 核心逻辑：生成不进位/不借位的数据
    function generateNoCarryAdd(max = 100) {
        let a = Math.floor(Math.random() * 90) + 5;
        let b = Math.floor(Math.random() * (max - a));
        // 检查个位是否进位
        while ((a % 10) + (b % 10) >= 10) {
            b = Math.floor(Math.random() * (max - a));
        }
        return [a, b];
    }

    function generateNoBorrowSub() {
        let a = Math.floor(Math.random() * 80) + 10;
        let b = Math.floor(Math.random() * a);
        // 检查个位是否需要借位
        while ((a % 10) < (b % 10)) {
            b = Math.floor(Math.random() * a);
        }
        return [a, b];
    }

    function drawSticks(num) {
        const tens = Math.floor(num / 10);
        const ones = num % 10;
        let html = '<div style="display:inline-block; border:1px solid #ddd; padding:5px; border-radius:5px;">';
        for(let i=0; i<tens; i++) html += '<div class="stick-ten"></div>';
        for(let i=0; i<ones; i++) html += '<div class="stick-one"></div>';
        html += `<br><span style="font-size:12px">${num}</span></div>`;
        return html;
    }

    function ask(type) {
        document.getElementById('explanation').style.display = 'none';
        document.getElementById('solve-btn').style.display = 'block';
        let qText = "";
        
        if (type === 'add') {
            const [a, b] = generateNoCarryAdd();
            currentData = { type: 'add', nums: [a, b], res: a + b };
            qText = `${a} + ${b} = ?`;
        } else if (type === 'sub') {
            const [a, b] = generateNoBorrowSub();
            currentData = { type: 'sub', nums: [a, b], res: a - b };
            qText = `${a} - ${b} = ?`;
        } else if (type === 'mix' || type === 'chain') {
            const [a, b] = generateNoCarryAdd(70);
            const res1 = a + b;
            const isAdd = Math.random() > 0.5;
            if (isAdd) {
                let c = Math.floor(Math.random() * (99 - res1));
                while((res1 % 10) + (c % 10) >= 10) c = Math.floor(Math.random() * (99 - res1));
                currentData = { type: 'mixAdd', nums: [a, b, c], res: res1 + c };
                qText = `${a} + ${b} + ${c} = ?`;
            } else {
                let c = Math.floor(Math.random() * res1);
                while((res1 % 10) < (c % 10)) c = Math.floor(Math.random() * res1);
                currentData = { type: 'mixSub', nums: [a, b, c], res: res1 - c };
                qText = `${a} + ${b} - ${c} = ?`;
            }
        }
        document.getElementById('question').innerText = qText;
    }

    function showExplanation() {
        const exp = document.getElementById('explanation');
        const vSteps = document.getElementById('visual-steps');
        const tSteps = document.getElementById('text-steps');
        exp.style.display = 'block';
        
        let vHtml = "";
        let tHtml = "";

        if (currentData.type === 'add') {
            vHtml = `<div class="visual-box">${drawSticks(currentData.nums[0])} <span class="op-sign">+</span> ${drawSticks(currentData.nums[1])} <span class="op-sign">=</span> ${drawSticks(currentData.res)}</div>`;
            tHtml = `<div class="step-text">分步口诀：</div>
                     1. 先算个位：${currentData.nums[0]%10} + ${currentData.nums[1]%10} = ${currentData.res%10}<br>
                     2. 再算十位：${Math.floor(currentData.nums[0]/10)}0 + ${Math.floor(currentData.nums[1]/10)}0 = ${Math.floor(currentData.res/10)}0<br>
                     3. 合起来就是 <b>${currentData.res}</b></div>`;
        } else if (currentData.type === 'sub') {
            vHtml = `<div class="visual-box">${drawSticks(currentData.nums[0])} <span class="op-sign">-</span> ${drawSticks(currentData.nums[1])} <span class="op-sign">=</span> ${drawSticks(currentData.res)}</div>`;
            tHtml = `<div class="step-text">减法小妙招：</div>
                     从大数里拿掉小数：<br>
                     1. 个位拿掉：${currentData.nums[0]%10} - ${currentData.nums[1]%10} = ${currentData.res%10}<br>
                     2. 十位拿掉：${Math.floor(currentData.nums[0]/10)}0 - ${Math.floor(currentData.nums[1]/10)}0 = ${Math.floor(currentData.res/10)}0<br>
                     3. 剩下 <b>${currentData.res}</b></div>`;
        } else {
            const [a, b, c] = currentData.nums;
            const res1 = a + b;
            const op2 = currentData.type === 'mixAdd' ? '+' : '-';
            vHtml = `<div class="visual-box">${drawSticks(a)} + ${drawSticks(b)} → ${drawSticks(res1)}</div>
                     <div class="visual-box">${drawSticks(res1)} ${op2} ${drawSticks(c)} = ${drawSticks(currentData.res)}</div>`;
            tHtml = `<div class="step-text">连算秘籍（从左往右算）：</div>
                     1. 先算前面两项：${a} + ${b} = ${res1}<br>
                     2. 再算最后一项：${res1} ${op2} ${c} = <b>${currentData.res}</b>`;
        }
        
        vSteps.innerHTML = vHtml;
        tSteps.innerHTML = tHtml;
    }
</script>

</body>
</html>
