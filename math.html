<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能数学乐园 - 修复流畅版</title>
    <style>
        :root {
            --primary: #4caf50;
            --secondary: #ff9800;
            --accent: #2196f3;
            --bg: #f5f7fa;
        }
        body { font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif; background-color: var(--bg); display: flex; justify-content: center; padding: 20px; margin: 0; }
        .container { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 8px 30px rgba(0,0,0,0.1); width: 100%; max-width: 700px; border: 4px solid var(--primary); position: relative; }
        
        h1 { text-align: center; color: #333; margin-bottom: 10px; }
        .section-title { font-size: 14px; color: #666; margin-bottom: 8px; font-weight: bold; }

        .range-selector { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin-bottom: 20px; background: #eee; padding: 10px; border-radius: 12px; }
        .range-btn { padding: 8px; font-size: 14px; border: 2px solid transparent; background: white; border-radius: 8px; cursor: pointer; transition: 0.2s; }
        .range-btn:hover { background: #e8f5e9; }
        .range-btn.active { background: var(--primary); color: white; border-color: #388e3c; box-shadow: 0 4px 10px rgba(76,175,80,0.3); }

        .type-selector { display: flex; gap: 10px; margin-bottom: 20px; justify-content: center; }
        .type-btn { flex: 1; padding: 12px; font-size: 16px; border: 3px solid transparent; border-radius: 10px; color: white; cursor: pointer; font-weight: bold; opacity: 0.7; }
        .type-btn.active { opacity: 1; border-color: rgba(0,0,0,0.2); transform: scale(1.05); }
        .add-btn { background: #66bb6a; }
        .sub-btn { background: #ef5350; }
        .mix-btn { background: #5c6bc0; }

        .quiz-action-btn { width: 100%; padding: 15px; background: #2e7d32; color: white; border: none; border-radius: 12px; font-size: 18px; font-weight: bold; cursor: pointer; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(46,125,50,0.2); transition: 0.3s; }
        .quiz-action-btn:hover { background: #1b5e20; transform: translateY(-2px); }

        #display-card { text-align: center; background: #fffde7; padding: 40px; border-radius: 15px; border: 2px dashed #ffd54f; margin-bottom: 20px; min-height: 200px; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        #question-text { font-size: 64px; font-weight: bold; color: #2c3e50; margin: 0; }
        .hint-text { font-size: 14px; color: #999; margin-top: 15px; }

        #explain-trigger { background: var(--secondary); color: white; padding: 10px 25px; border: none; border-radius: 20px; font-size: 18px; cursor: pointer; display: none; margin-top: 20px; }

        #explanation { display: none; margin-top: 20px; padding: 20px; border-radius: 15px; background: white; border: 2px solid #ddd; animation: fadeIn 0.5s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        .stick-bundle { display: inline-flex; flex-wrap: wrap; max-width: 120px; border: 1px solid #ddd; padding: 5px; border-radius: 5px; background: #fafafa; vertical-align: middle; }
        .stick-ten { width: 10px; height: 35px; background: #8d6e63; border: 1px solid #5d4037; border-top: 3px solid #fdd835; margin: 1px; border-radius: 2px; }
        .stick-one { width: 4px; height: 30px; background: #fdd835; border: 1px solid #fbc02d; margin: 1px; border-radius: 1px; }
        .vis-item { display: inline-block; text-align: center; margin: 5px; }
        .vis-num { display: block; font-size: 12px; font-weight: bold; color: #555; }
        .symbol { font-size: 24px; font-weight: bold; margin: 0 10px; color: #ff5722; }

        #quiz-layer { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 999; overflow-y: auto; padding: 40px 20px; box-sizing: border-box; }
        .quiz-header { display: flex; justify-content: space-between; align-items: center; max-width: 1000px; margin: 0 auto 30px; border-bottom: 3px solid var(--primary); padding-bottom: 10px; }
        .quiz-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; max-width: 1000px; margin: 0 auto; }
        .quiz-cell { font-size: 22px; padding: 12px 5px; border-bottom: 1px solid #eee; color: #333; letter-spacing: 1px; }
        .back-btn { padding: 10px 25px; background: #607d8b; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container" id="main-view">
    <h1>🍎 智能数学乐园</h1>
    
    <div class="section-title">第一步：选择难度 (点击即出题)</div>
    <div class="range-selector" id="range-box"></div>

    <button class="quiz-action-btn" onclick="showQuizPage()">📝 生成100道随机练习题</button>

    <div class="section-title">第二步：选择类型</div>
    <div class="type-selector">
        <button id="btn-add" class="type-btn add-btn active" onclick="changeType('add')">加法练习</button>
        <button id="btn-sub" class="type-btn sub-btn" onclick="changeType('sub')">减法练习</button>
        <button id="btn-mix" class="type-btn mix-btn" onclick="changeType('mix')">混合连算</button>
    </div>

    <div id="display-card">
        <p id="question-text">准备好了吗？</p>
        <p class="hint-text" id="range-hint">当前选择：20以内</p>
        <button id="explain-trigger" onclick="toggleExplain()">💡 查看解题思路</button>
    </div>

    <div id="explanation">
        <div id="vis-area" style="text-align:center; margin-bottom:15px;"></div>
        <div id="text-area" style="line-height:1.8; color:#444; border-top:1px solid #eee; padding-top:10px;"></div>
    </div>
</div>

<div id="quiz-layer">
    <div class="quiz-header">
        <h2 id="quiz-title-text" style="margin:0; color:#333;">练习卷</h2>
        <button class="back-btn" onclick="hideQuizPage()">返回主页</button>
    </div>
    <div id="quiz-list" class="quiz-grid"></div>
</div>

<script>
    let currentLimit = 20;
    let currentType = 'add';
    let currentData = null;

    const rangeBox = document.getElementById('range-box');
    for (let i = 10; i <= 100; i += 10) {
        const btn = document.createElement('button');
        btn.className = `range-btn ${i === 20 ? 'active' : ''}`;
        btn.innerText = i + '以内';
        btn.onclick = function() {
            document.querySelectorAll('.range-btn').forEach(b => b.classList.remove('active'));
            this.classList.add('active');
            currentLimit = i;
            document.getElementById('range-hint').innerText = `当前选择：${i}以内`;
            generate(); 
        };
        rangeBox.appendChild(btn);
    }

    function changeType(type) {
        currentType = type;
        document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(`btn-${type}`).classList.add('active');
        generate();
    }

    // 修复：增加安全阀门，防止小数字范围下的死循环
    function getAdd(max) {
        let a, b, tries = 0;
        do {
            tries++;
            a = Math.floor(Math.random() * (max - 1)) + 1;
            b = Math.floor(Math.random() * (max - a)) + 1;
            if (tries > 100) break; // 安全跳出
        } while ((a % 10) + (b % 10) >= 10 || b === 0);
        return [a, b];
    }

    function getSub(max) {
        let a, b, tries = 0;
        do {
            tries++;
            a = Math.floor(Math.random() * (max - 1)) + 1;
            b = Math.floor(Math.random() * a) + 1;
            if (tries > 100) break; 
        } while ((a % 10) < (b % 10) || b === 0 || a === b);
        return [a, b];
    }

    function getMixExpr(max) {
        let tries = 0;
        while (tries < 100) {
            tries++;
            const [a, b] = getAdd(max - 2); 
            const r1 = a + b;
            if (Math.random() > 0.5) {
                // 连加
                let c = Math.floor(Math.random() * (max - r1)) + 1;
                if ((r1 % 10) + (c % 10) < 10 && c > 0 && r1 + c <= max) {
                    return `${a} + ${b} + ${c} =`;
                }
            } else {
                // 加减混合
                let c = Math.floor(Math.random() * r1) + 1;
                if ((r1 % 10) >= (c % 10) && c > 0 && r1 - c > 0) {
                    return `${a} + ${b} - ${c} =`;
                }
            }
        }
        return "1 + 2 + 3 ="; // 保底题目
    }

    function generate() {
        document.getElementById('explanation').style.display = 'none';
        document.getElementById('explain-trigger').style.display = 'block';
        let q = "";
        if (currentType === 'add') {
            const [a, b] = getAdd(currentLimit);
            currentData = { type: 'add', nums: [a, b], res: a + b };
            q = `${a} + ${b} = ?`;
        } else if (currentType === 'sub') {
            const [a, b] = getSub(currentLimit);
            currentData = { type: 'sub', nums: [a, b], res: a - b };
            q = `${a} - ${b} = ?`;
        } else {
            const expr = getMixExpr(currentLimit);
            q = expr + " ?";
            currentData = { type: 'mix', text: expr };
        }
        document.getElementById('question-text').innerText = q;
    }

    function showQuizPage() {
        const list = document.getElementById('quiz-list');
        list.innerHTML = "正在努力生成题目..."; // 状态提示
        
        // 使用 setTimeout 让出主线程，防止 UI 渲染卡死
        setTimeout(() => {
            list.innerHTML = "";
            document.getElementById('quiz-title-text').innerText = `${currentLimit}以内 100题练习`;
            
            const fragment = document.createDocumentFragment();
            for (let i = 0; i < 100; i++) {
                const div = document.createElement('div');
                div.className = 'quiz-cell';
                const dice = Math.random();
                if (dice < 0.8) {
                    div.innerText = getMixExpr(currentLimit);
                } else if (dice < 0.9) {
                    const [a, b] = getAdd(currentLimit);
                    div.innerText = `${a} + ${b} =`;
                } else {
                    const [a, b] = getSub(currentLimit);
                    div.innerText = `${a} - ${b} =`;
                }
                fragment.appendChild(div);
            }
            list.appendChild(fragment);
            document.getElementById('quiz-layer').style.display = 'block';
        }, 10);
    }

    function hideQuizPage() {
        document.getElementById('quiz-layer').style.display = 'none';
    }

    function drawSticks(n) {
        const tens = Math.floor(n / 10);
        const ones = n % 10;
        let html = '<div class="vis-item"><div class="stick-bundle">';
        for(let i=0; i<tens; i++) html += '<div class="stick-ten"></div>';
        for(let i=0; i<ones; i++) html += '<div class="stick-one"></div>';
        if(n === 0 && tens === 0 && ones === 0) html += '<span style="color:#ccc; font-size:10px;">0</span>';
        html += `</div><span class="vis-num">${n}</span></div>`;
        return html;
    }

    function toggleExplain() {
        const exp = document.getElementById('explanation');
        const vis = document.getElementById('vis-area');
        const txt = document.getElementById('text-area');
        exp.style.display = 'block';
        let vHtml = "", tHtml = "";
        
        if (currentData.type !== 'mix') {
            const nums = currentData.nums;
            const sym = currentData.type === 'add' ? '+' : '-';
            vHtml = drawSticks(nums[0]) + `<span class="symbol">${sym}</span>` + drawSticks(nums[1]) + `<span class="symbol">=</span>` + drawSticks(currentData.res);
            tHtml = `<b>💡 解题思路：</b><br>
                    • <b>看个位：</b>${nums[0]%10} ${sym} ${nums[1]%10} = ${currentData.res%10}<br>
                    • <b>看十位：</b>${Math.floor(nums[0]/10)}0 ${sym} ${Math.floor(nums[1]/10)}0 = ${Math.floor(currentData.res/10)}0<br>
                    • <b>合起来：</b>就是 <strong>${currentData.res}</strong>`;
        } else {
            vHtml = "💡 混合运算请按照从左往右的顺序计算哦！";
            txt.innerHTML = "提示：先算出前面两个数的得数，再用它和第三个数进行计算。";
        }
        vis.innerHTML = vHtml;
        txt.innerHTML = tHtml;
    }

    window.onload = generate;
</script>

</body>
</html>
