<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能数学乐园 - 练习模式</title>
    <style>
        :root {
            --primary: #4caf50;
            --secondary: #ff9800;
            --bg: #f5f7fa;
            --sheet-bg: #fff;
        }
        body { font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif; background-color: var(--bg); margin: 0; padding: 20px; display: flex; justify-content: center; }
        
        /* 主界面容器 */
        .container { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 8px 30px rgba(0,0,0,0.1); width: 100%; max-width: 700px; border: 4px solid var(--primary); }
        
        h1 { text-align: center; color: #333; margin-top: 0; }
        .section-title { font-size: 14px; color: #666; margin-bottom: 8px; font-weight: bold; }

        /* 范围选择器 */
        .range-selector { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin-bottom: 20px; background: #eee; padding: 10px; border-radius: 12px; }
        .range-btn { padding: 8px; font-size: 14px; border: none; background: white; border-radius: 8px; cursor: pointer; transition: 0.2s; }
        .range-btn.active { background: var(--primary); color: white; box-shadow: 0 4px 10px rgba(76,175,80,0.3); }

        /* 类型按钮 */
        .type-selector { display: flex; gap: 10px; margin-bottom: 20px; }
        .type-btn { flex: 1; padding: 12px; font-size: 16px; border: none; border-radius: 10px; color: white; cursor: pointer; font-weight: bold; opacity: 0.6; }
        .type-btn.active { opacity: 1; transform: scale(1.05); }
        .add-btn { background: #66bb6a; }
        .sub-btn { background: #ef5350; }
        .mix-btn { background: #5c6bc0; }

        /* 出题按钮（练习模式） */
        .quiz-mode-btn { width: 100%; padding: 15px; background: #2e7d32; color: white; border: none; border-radius: 12px; font-size: 20px; font-weight: bold; cursor: pointer; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(46,125,50,0.3); }
        .quiz-mode-btn:hover { background: #1b5e20; }

        /* 展示卡片 */
        #display-card { text-align: center; background: #fffde7; padding: 40px; border-radius: 15px; border: 2px dashed #ffd54f; margin-bottom: 20px; }
        #question-text { font-size: 64px; font-weight: bold; color: #2c3e50; margin: 0; }
        #explain-trigger { background: var(--secondary); color: white; padding: 10px 25px; border: none; border-radius: 20px; font-size: 18px; cursor: pointer; display: none; margin-top: 20px; }

        /* 讲解区 */
        #explanation { display: none; margin-top: 20px; padding: 20px; border-radius: 15px; background: white; border: 2px solid #ddd; }
        .stick-bundle { display: inline-flex; flex-wrap: wrap; max-width: 120px; border: 1px solid #ddd; padding: 5px; border-radius: 5px; background: #fafafa; }
        .stick-ten { width: 10px; height: 35px; background: #8d6e63; border: 1px solid #5d4037; border-top: 3px solid #fdd835; margin: 1px; border-radius: 2px; }
        .stick-one { width: 4px; height: 30px; background: #fdd835; border: 1px solid #fbc02d; margin: 1px; border-radius: 1px; }
        .vis-item { display: inline-block; text-align: center; margin: 5px; }
        .symbol { font-size: 24px; font-weight: bold; margin: 0 10px; color: #ff5722; }

        /* 全屏练习页 */
        #quiz-page { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 100; overflow-y: auto; padding: 40px 20px; box-sizing: border-box; }
        .quiz-header { display: flex; justify-content: space-between; align-items: center; max-width: 900px; margin: 0 auto 30px; border-bottom: 2px solid #eee; padding-bottom: 15px; }
        .back-btn { padding: 10px 20px; background: #607d8b; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; }
        .quiz-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; max-width: 1000px; margin: 0 auto; }
        .quiz-item { font-size: 20px; padding: 10px; border-bottom: 1px solid #eee; color: #333; white-space: nowrap; }

        @media print {
            .back-btn { display: none; }
            #quiz-page { position: relative; padding: 0; }
        }
    </style>
</head>
<body>

<div class="container" id="main-ui">
    <h1>🍎 智能数学乐园</h1>
    
    <div class="section-title">难度范围 (点击即切换)</div>
    <div class="range-selector" id="range-box"></div>

    <button class="quiz-mode-btn" onclick="openQuizMode()">📝 生成100道练习题</button>

    <div class="section-title">练习类型</div>
    <div class="type-selector">
        <button id="btn-add" class="type-btn add-btn active" onclick="changeType('add')">单加</button>
        <button id="btn-sub" class="type-btn sub-btn" onclick="changeType('sub')">单减</button>
        <button id="btn-mix" class="type-btn mix-btn" onclick="changeType('mix')">混合连算</button>
    </div>

    <div id="display-card">
        <p id="question-text">加载中...</p>
        <button id="explain-trigger" onclick="toggleExplain()">💡 查看解析</button>
    </div>

    <div id="explanation">
        <div id="vis-area" style="text-align:center; margin-bottom:15px;"></div>
        <div id="text-area" style="line-height:1.8; color:#444; border-top:1px solid #eee; padding-top:10px;"></div>
    </div>
</div>

<div id="quiz-page">
    <div class="quiz-header">
        <h2 id="quiz-title">100道混合练习题</h2>
        <button class="back-btn" onclick="closeQuizMode()">返回主页</button>
    </div>
    <div id="quiz-content" class="quiz-grid"></div>
</div>

<script>
    let currentLimit = 20;
    let currentType = 'add';
    let currentData = null;

    // 初始化难度按钮
    const rangeBox = document.getElementById('range-box');
    for (let i = 10; i <= 100; i += 10) {
        const btn = document.createElement('button');
        btn.className = `range-btn ${i === 20 ? 'active' : ''}`;
        btn.innerText = i + '以内';
        btn.onclick = function() {
            document.querySelectorAll('.range-btn').forEach(b => b.classList.remove('active'));
            this.classList.add('active');
            currentLimit = i;
            generate();
        };
        rangeBox.appendChild(btn);
    }

    function changeType(type) {
        currentType = type;
        document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(`btn-${type}`).classList.add('active');
        generate();
    }

    // 核心逻辑：不进位加法
    function getAdd(max) {
        let a, b;
        do {
            a = Math.floor(Math.random() * (max - 1)) + 1;
            b = Math.floor(Math.random() * (max - a));
        } while ((a % 10) + (b % 10) >= 10);
        return [a, b];
    }

    // 核心逻辑：不借位减法
    function getSub(max) {
        let a, b;
        do {
            a = Math.floor(Math.random() * (max - 1)) + 1;
            b = Math.floor(Math.random() * a);
        } while ((a % 10) < (b % 10));
        return [a, b];
    }

    // 生成混合/连算题字符串
    function getMixExpression(max) {
        const rand = Math.random();
        if (rand < 0.3) {
            const [a, b] = getAdd(max); return `${a} + ${b} =`;
        } else if (rand < 0.6) {
            const [a, b] = getSub(max); return `${a} - ${b} =`;
        } else {
            const [a, b] = getAdd(max - 5);
            const r1 = a + b;
            if (Math.random() > 0.5) {
                let c = Math.floor(Math.random() * (max - r1));
                while((r1 % 10) + (c % 10) >= 10) c = Math.floor(Math.random() * 5);
                return `${a} + ${b} + ${c} =`;
            } else {
                let c = Math.floor(Math.random() * r1);
                while((r1 % 10) < (c % 10)) c = Math.floor(Math.random() * r1);
                return `${a} + ${b} - ${c} =`;
            }
        }
    }

    function generate() {
        document.getElementById('explanation').style.display = 'none';
        document.getElementById('explain-trigger').style.display = 'block';
        if (currentType === 'add') {
            const [a, b] = getAdd(currentLimit);
            currentData = { type: 'add', nums: [a, b], res: a + b };
            document.getElementById('question-text').innerText = `${a} + ${b} = ?`;
        } else if (currentType === 'sub') {
            const [a, b] = getSub(currentLimit);
            currentData = { type: 'sub', nums: [a, b], res: a - b };
            document.getElementById('question-text').innerText = `${a} - ${b} = ?`;
        } else {
            const expr = getMixExpression(currentLimit);
            document.getElementById('question-text').innerText = expr + " ?";
            // 简单处理混合题的数据存储用于演示解析
            const parts = expr.split(' ');
            currentData = { type: 'mix', text: expr, nums: parts };
        }
    }

    // 练习模式
    function openQuizMode() {
        const quizPage = document.getElementById('quiz-page');
        const quizContent = document.getElementById('quiz-content');
        document.getElementById('quiz-title').innerText = `${currentLimit}以内混合练习 (100题)`;
        quizContent.innerHTML = "";
        
        for (let i = 1; i <= 100; i++) {
            const item = document.createElement('div');
            item.className = 'quiz-item';
            item.innerText = `${i}. ${getMixExpression(currentLimit)}`;
            quizContent.appendChild(item);
        }
        
        quizPage.style.display = 'block';
        document.body.style.overflow = 'hidden';
    }

    function closeQuizMode() {
        document.getElementById('quiz-page').style.display = 'none';
        document.body.style.overflow = 'auto';
    }

    // 解析逻辑保持不变...
    function drawSticks(n) {
        const tens = Math.floor(n / 10);
        const ones = n % 10;
        let html = '<div class="vis-item"><div class="stick-bundle">';
        for(let i=0; i<tens; i++) html += '<div class="stick-ten"></div>';
        for(let i=0; i<ones; i++) html += '<div class="stick-one"></div>';
        html += `</div><div style="font-size:12px;font-weight:bold">${n}</div></div>`;
        return html;
    }

    function toggleExplain() {
        const exp = document.getElementById('explanation');
        exp.style.display = 'block';
        const vis = document.getElementById('vis-area');
        const txt = document.getElementById('text-area');
        
        if (currentData.type !== 'mix') {
            const sym = currentData.type === 'add' ? '+' : '-';
            vis.innerHTML = drawSticks(currentData.nums[0]) + `<span class="symbol">${sym}</span>` + drawSticks(currentData.nums[1]) + `<span class="symbol">=</span>` + drawSticks(currentData.res);
            txt.innerHTML = `个位：${currentData.nums[0]%10} ${sym} ${currentData.nums[1]%10} = ${currentData.res%10}<br>十位：${Math.floor(currentData.nums[0]/10)}0 ${sym} ${Math.floor(currentData.nums[1]/10)}0 = ${Math.floor(currentData.res/10)}0`;
        } else {
            vis.innerHTML = "💡 混合运算请按照从左往右的顺序，像剥洋葱一样一步步计算哦！";
            txt.innerHTML = "提示：先算前面两个数的结果，再和第三个数计算。";
        }
    }

    window.onload = generate;
</script>

</body>
</html>
